{% extends "base.html" %}
{% block title %}Новый пароль | Taskplanner{% endblock %}
{% block content %}
<main class="auth-layout">
    <section class="auth-card">
        <div>
            <p class="eyebrow">Taskplanner</p>
            <h1>Новый пароль</h1>
            <p class="muted">Установите новый пароль для входа.</p>
        </div>
        <form method="post" class="form-grid">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="button button-primary">Сменить пароль</button>
        </form>
    </section>
</main>
{% endblock %}
