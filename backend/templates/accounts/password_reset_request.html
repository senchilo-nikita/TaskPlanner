{% extends "base.html" %}
{% block title %}Сброс пароля | Taskplanner{% endblock %}
{% block content %}
<main class="auth-layout">
    <section class="auth-card">
        <div>
            <p class="eyebrow">Taskplanner</p>
            <h1>Сброс пароля</h1>
            <p class="muted">Введите email, и мы отправим ссылку для смены пароля.</p>
        </div>
        <form method="post" class="form-grid">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="button button-primary">Отправить письмо</button>
        </form>
    </section>
</main>
{% endblock %}
