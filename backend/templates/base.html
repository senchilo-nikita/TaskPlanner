{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f2f2f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <title>{% block title %}Taskplanner{% endblock %}</title>
    <link rel="manifest" href="{% static 'manifest.json' %}">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="icon" href="{% static 'icons/icon.svg' %}">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="{% static 'js/kanban.js' %}"></script>
</head>
<body>
    <div class="page-shell">
        {% if messages %}
            <div class="flash-stack">
                {% for message in messages %}
                    <div class="flash {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script>
        (function () {
            const savedTheme = localStorage.getItem("taskplanner-theme");
            if (savedTheme === "dark") {
                document.body.classList.add("theme-dark");
            }
        })();

        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("{% static 'sw.js' %}");
            });
        }
    </script>
</body>
</html>
